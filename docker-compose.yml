services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_app
    restart: unless-stopped
    environment:
      # Fallback để docker compose config vẫn validate được nếu chưa có .env
      DATABASE_URL: ${DATABASE_URL:-postgresql://erp_user:erp_pass@db:5432/erp_db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-32-chars-minimum}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-construction-photos}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    expose:
      - "3000"
    depends_on:
      - db
      - minio
    networks:
      - erp_net

  db:
    image: postgres:15-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_pass}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - erp_net

  minio:
    image: minio/minio:latest
    container_name: erp_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - erp_net

  nginx:
    image: nginx:1.27-alpine
    container_name: erp_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Placeholder cho bước SSL/Certbot (Bước 10)
      - ./docker/nginx/certs:/etc/nginx/certs
    networks:
      - erp_net

volumes:
  postgres_data:
  minio_data:

networks:
  erp_net:
    driver: bridge
