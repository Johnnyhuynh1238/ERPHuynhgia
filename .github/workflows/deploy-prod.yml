name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/johnnyhuynh1238/erphuynhgia-app

jobs:
  # 1) Build Docker image trên runner GitHub (RAM thoải mái) rồi push lên ghcr.
  #    VPS KHÔNG build gì -> hết nghẹt RAM / OOM / lỗi font DNS.
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # next build (collect page data) cần các biến env "có mặt" nếu không sẽ throw
      # ở lúc import module. Runtime dùng .env.production THẬT trên VPS (compose env_file);
      # ở đây chỉ cần giá trị giả để build qua. Ngoại lệ: NEXT_PUBLIC_* bị bake vào bundle
      # client -> phải là giá trị THẬT (VAPID public key vốn công khai, không nhạy cảm).
      # File này chỉ tồn tại ở builder stage, KHÔNG vào image cuối (runner stage không COPY).
      - name: Write build-time env
        run: |
          cat > .env.production <<'ENVEOF'
          POSTGRES_DB=build
          POSTGRES_USER=build
          POSTGRES_PASSWORD=build
          DATABASE_URL=postgresql://build:build@localhost:5432/build?schema=public
          NEXTAUTH_SECRET=build-time-placeholder-not-used-at-runtime
          NEXTAUTH_URL=https://erp.huynhgia6.com
          AUTH_TRUST_HOST=true
          MINIO_ROOT_USER=build
          MINIO_ROOT_PASSWORD=build
          MINIO_ENDPOINT=http://localhost:9000
          MINIO_ACCESS_KEY=build
          MINIO_SECRET_KEY=build
          MINIO_BUCKET=build
          OPENAI_API_KEY=sk-build-placeholder
          OPENAI_MODEL=gpt-4o-mini
          VAPID_SUBJECT=mailto:build@example.com
          VAPID_PUBLIC_KEY=BBdD-RFMIYmCmtJS7hA82w5JAdHa6SaUbhOpwFTU9Au9anp1rVEvodGf6p12wzQuNJgu0Msnfa6DyE8UsVqbIkA
          VAPID_PRIVATE_KEY=build-placeholder
          NEXT_PUBLIC_VAPID_PUBLIC_KEY=BBdD-RFMIYmCmtJS7hA82w5JAdHa6SaUbhOpwFTU9Au9anp1rVEvodGf6p12wzQuNJgu0Msnfa6DyE8UsVqbIkA
          PUSH_CRON_KEY=build
          HDTK_PDF_SECRET=build
          CLAUDE_WEB_SECRET=build-placeholder-runtime-real
          ENVEOF
          echo "wrote build-time .env.production ($(wc -l < .env.production) lines)"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) VPS chỉ pull image có sẵn + restart + migrate + health check (nhẹ, ~1 phút).
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare SSH
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [ -n "$PROD_KNOWN_HOSTS" ]; then
            printf '%s\n' "$PROD_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            SSH_PORT="${PROD_SSH_PORT:-22}"
            ssh-keyscan -p "$SSH_PORT" "$PROD_SSH_HOST" > "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy to production server (pull image)
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          APP_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
        run: |
          set -euo pipefail

          SSH_PORT="${PROD_SSH_PORT:-22}"
          RELEASE_BUNDLE="$RUNNER_TEMP/erp-release-${GITHUB_SHA}.bundle"
          REMOTE_BUNDLE="/tmp/erp-release-${GITHUB_SHA}.bundle"

          git bundle create "$RELEASE_BUNDLE" HEAD
          scp -P "$SSH_PORT" "$RELEASE_BUNDLE" "$PROD_SSH_USER@$PROD_SSH_HOST:$REMOTE_BUNDLE"

          ssh -p "$SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "set -euo pipefail; \
             cd '$PROD_APP_DIR'; \
             ts=\$(date +%Y%m%d%H%M%S); \
             mkdir -p .deploy-backups; \
             git status --short > .deploy-backups/status-\$ts.txt || true; \
             git diff > .deploy-backups/worktree-\$ts.patch || true; \
             git diff --cached > .deploy-backups/staged-\$ts.patch || true; \
             git rev-parse HEAD > .deploy-backups/head-\$ts.txt || true; \
             git branch backup/deploy-\$ts HEAD || true; \
             git fetch '$REMOTE_BUNDLE' HEAD; \
             git update-ref refs/remotes/origin/master FETCH_HEAD; \
             git checkout master; \
             git reset --hard FETCH_HEAD; \
             rm -f '$REMOTE_BUNDLE'; \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin; \
             APP_IMAGE='$APP_IMAGE' bash scripts/deploy-prod.sh; \
             docker logout ghcr.io || true"
