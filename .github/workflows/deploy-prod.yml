name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare SSH
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [ -n "$PROD_KNOWN_HOSTS" ]; then
            printf '%s\n' "$PROD_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            SSH_PORT="${PROD_SSH_PORT:-22}"
            ssh-keyscan -p "$SSH_PORT" "$PROD_SSH_HOST" > "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy to production server
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          set -euo pipefail

          SSH_PORT="${PROD_SSH_PORT:-22}"
          RELEASE_BUNDLE="$RUNNER_TEMP/erp-release-${GITHUB_SHA}.bundle"
          REMOTE_BUNDLE="/tmp/erp-release-${GITHUB_SHA}.bundle"

          git bundle create "$RELEASE_BUNDLE" HEAD
          scp -P "$SSH_PORT" "$RELEASE_BUNDLE" "$PROD_SSH_USER@$PROD_SSH_HOST:$REMOTE_BUNDLE"

          ssh -p "$SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" "set -euo pipefail; cd '$PROD_APP_DIR'; ts=\$(date +%Y%m%d%H%M%S); mkdir -p .deploy-backups; git status --short > .deploy-backups/status-\$ts.txt || true; git diff > .deploy-backups/worktree-\$ts.patch || true; git diff --cached > .deploy-backups/staged-\$ts.patch || true; git rev-parse HEAD > .deploy-backups/head-\$ts.txt || true; git branch backup/deploy-\$ts HEAD || true; git fetch '$REMOTE_BUNDLE' HEAD; git update-ref refs/remotes/origin/master FETCH_HEAD; git checkout master; git reset --hard FETCH_HEAD; rm -f '$REMOTE_BUNDLE'; bash scripts/deploy-prod.sh"
